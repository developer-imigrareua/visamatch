version: '3.8'

services:
  visamatch:
    build: ./backend
    container_name: visamatch
    restart: unless-stopped
    ports:
      - "3001:3000"       # host:3001 → container:3000 (não conflita com liv-ai nem n8n:5678)
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./backend/uploads:/app/uploads   # áudios temporários (se necessário)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
