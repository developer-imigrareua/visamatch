# ── Visa Match — Nginx Config ──
# Arquivo: /etc/nginx/sites-available/visamatch
# Ativar: ln -s /etc/nginx/sites-available/visamatch /etc/nginx/sites-enabled/visamatch
#
# IMPORTANTE: este arquivo é INDEPENDENTE dos outros sites.
# Não altera ai.liv.law nem vault.liv.law.
# SSL configurado separadamente via: certbot --nginx -d visamatch.imigrareua.com

server {
    listen 80;
    server_name visamatch.imigrareua.com www.visamatch.imigrareua.com;

    # Redireciona para HTTPS após SSL configurado
    # return 301 https://$host$request_uri;

    root /var/www/visamatch;

    # ── Frontend (arquivos estáticos) ──
    location / {
        root /var/www/visamatch/frontend;
        try_files $uri $uri/ /index.html;
    }

    # ── Admin Panel (arquivos estáticos) ──
    location /admin {
        alias /var/www/visamatch/admin;
        try_files $uri $uri/ /admin/index.html;
    }

    # ── API — proxy para container Docker na porta 3001 ──
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25M;
        proxy_read_timeout 60s;
    }

    # ── Rotas diretas da API ──
    location ~ ^/(transcribe|lead|session|health|analyze|lead/partial) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 25M;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/visamatch_access.log;
    error_log  /var/log/nginx/visamatch_error.log;
}

# ── HTTPS (gerado pelo certbot automaticamente) ──
# Comando para gerar: certbot --nginx -d visamatch.imigrareua.com
