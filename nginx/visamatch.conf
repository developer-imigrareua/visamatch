server {
    listen 80;
    server_name seudominio.com www.seudominio.com;

    # Redireciona HTTP → HTTPS (ativar após configurar SSL)
    # return 301 https://$host$request_uri;

    root /var/www/visamatch;
    index index.html;

    # ── Frontend ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Admin Panel (protegido pelo login, não exposto na raiz) ──
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # ── API Backend (proxy para Node.js) ──
    location /api/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 25M;
    }

    # ── Rotas da API sem prefixo /api ──
    location ~ ^/(transcribe|lead|session|health) {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 25M;
    }

    # Logs
    access_log /var/log/nginx/visamatch_access.log;
    error_log  /var/log/nginx/visamatch_error.log;
}

