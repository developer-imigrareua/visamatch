# ── Visa Match — Nginx Config ──
# Arquivo: /etc/nginx/sites-available/visamatch
# IMPORTANTE: este arquivo é INDEPENDENTE dos outros sites.
# Não altera ai.liv.law nem vault.liv.law.

server {
    listen 80 default_server;
    server_name visamatch.imigrareua.com www.visamatch.imigrareua.com _;

    root /var/www/visamatch;

    # ── Frontend (arquivos estáticos) ──
    location / {
        root /var/www/visamatch/frontend;
        try_files $uri $uri/ /index.html;
    }

    # ── Admin Panel (arquivos estáticos) ──
    location /admin {
        alias /var/www/visamatch/admin;
        try_files $uri $uri/ /admin/index.html;
    }

    # ── Portal do usuário (arquivos estáticos) ──
    location /portal {
        alias /var/www/visamatch/portal;
        try_files $uri $uri/ /portal/index.html;
    }

    # ── API Admin — /api/admin/* → container /admin/* ──
    location /api/admin {
        proxy_pass http://127.0.0.1:3001/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25M;
        proxy_read_timeout 60s;
    }

    # ── API geral — /api/* → container /* ──
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25M;
        proxy_read_timeout 120s;
    }

    # ── Rotas diretas da API ──
    location ~ ^/(transcribe|lead|session|health|analyze|auth|user) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 25M;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/visamatch_access.log;
    error_log  /var/log/nginx/visamatch_error.log;
}
