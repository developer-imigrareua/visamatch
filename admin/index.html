<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#001f54;--blue:#1A72F6;--txt:#18202e;--txt2:#64748b;--txt3:#94a3b8;--red:#dc2626;--border:rgba(11,25,41,.12)}
html,body{height:100%;font-family:'Inter Tight',sans-serif;background:#f7f9fc;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:340px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.06)}
.mark{width:36px;height:36px;background:var(--navy);border-radius:9px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:15px;color:#fff;font-weight:700;letter-spacing:-.02em}
.title{font-size:16px;font-weight:600;color:var(--txt);text-align:center;margin-bottom:4px}
.sub{font-size:12.5px;color:var(--txt3);text-align:center;margin-bottom:24px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt2);margin-bottom:6px}
.pwd-wrap{position:relative}
.pwd-wrap input{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:11px 42px 11px 13px;font-family:'Inter Tight',sans-serif;font-size:13.5px;color:var(--txt);outline:none;transition:border-color .15s;background:#fafafa}
.pwd-wrap input:focus{border-color:var(--blue);background:#fff}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txt3);padding:0;display:flex;align-items:center;transition:color .15s}
.eye-btn:hover{color:var(--txt)}
.btn{width:100%;margin-top:16px;background:var(--navy);color:#fff;border:none;border-radius:9px;padding:12px;font-family:'Inter Tight',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:default}
.err{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.18);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:16px;display:none}
.err.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="mark">V</div>
  <div class="title">Acesso restrito</div>
  <div class="sub">Painel administrativo</div>
  <div class="err" id="err">Senha incorreta.</div>
  <div class="field">
    <label>Senha</label>
    <div class="pwd-wrap">
      <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password"/>
      <button class="eye-btn" type="button" onclick="togglePwd()" tabindex="-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>
  <button class="btn" id="btn" onclick="login()">Entrar</button>
</div>
<script>
const API = '/api/admin';
document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function togglePwd() {
  const input = document.getElementById('pwd');
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
}

if (localStorage.getItem('admin_token')) window.location.href = '/admin/dashboard.html';

async function login() {
  const pwd = document.getElementById('pwd').value.trim();
  if (!pwd) return;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.disabled = true;
  btn.textContent = 'Verificando...';
  err.classList.remove('show');
  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    if (!res.ok) throw new Error();
    const { token } = await res.json();
    localStorage.setItem('admin_token', token);
    window.location.href = '/admin/dashboard.html';
  } catch {
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}
</script>
</body>
</html>
