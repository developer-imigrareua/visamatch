<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa Match · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0053d0;--blue2:#1A72F6;--blue3:#003fa3;--blue4:#002b70;
  --pink:#ff4b82;--pink2:#ff7aaa;
  --surface:#ffffff;--surface2:#f8faff;--surface3:#f0f4ff;--surface4:#e5eeff;
  --txt:#0b1c30;--txt2:#424655;--txt3:#737687;
  --border:rgba(194,198,216,.5);
  --green:#1d9e70;--amber:#d97706;--red:#dc2626;
  --sidebar:260px
}
html,body{height:100%;font-family:'Inter Tight','Inter',sans-serif;background:var(--surface2);color:var(--txt);overflow:hidden}
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;height:100vh}

/* ── SIDEBAR ── */
.sidebar{background:linear-gradient(180deg,#1A72F6 0%,#002b70 100%);display:flex;flex-direction:column;padding:28px 20px;position:relative;overflow:hidden}
.sb-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 15% 10%,rgba(201,168,76,.12) 0%,transparent 55%);pointer-events:none}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:36px;position:relative}
.brand-ico{width:40px;height:40px;background:#fff;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--blue);font-weight:700;flex-shrink:0}
.brand-name{font-family:'Manrope',sans-serif;font-size:17px;color:#fff;line-height:1.2;font-weight:700}
.brand-sub{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:.1em;text-transform:uppercase}
.nav{display:flex;flex-direction:column;gap:3px;flex:1;position:relative}
.nav-sec{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.22);font-weight:600;margin:16px 0 8px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);color:#fff}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.sb-footer{position:relative;border-top:1px solid rgba(255,255,255,.07);padding-top:16px;margin-top:16px}
.logout-btn{display:flex;align-items:center;gap:8px;font-size:12.5px;color:rgba(255,255,255,.35);cursor:pointer;background:none;border:none;padding:6px 8px;border-radius:7px;transition:all .2s;width:100%}
.logout-btn:hover{color:var(--red);background:rgba(220,38,38,.07)}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:16px 28px;background:#fff;border-bottom:1px solid rgba(11,25,41,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-family:'Manrope',sans-serif;font-size:20px;color:var(--txt);font-weight:700}
.topbar-sub{font-size:11.5px;color:var(--txt3);margin-top:1px}
.refresh-btn{display:flex;align-items:center;gap:6px;background:var(--surface3);border:1.5px solid var(--border);border-radius:9px;padding:7px 14px;font-size:12.5px;font-family:'Inter Tight',sans-serif;color:var(--txt2);cursor:pointer;transition:all .2s}
.refresh-btn:hover{border-color:var(--blue2);color:var(--txt)}
.refresh-btn svg{width:13px;height:13px}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:rgba(11,25,41,.1);border-radius:3px}

/* ── PANELS ── */
.panel{display:none}
.panel.active{display:block}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid rgba(11,25,41,.06);border-radius:14px;padding:18px 20px}
.kpi-label{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-bottom:10px}
.kpi-val{font-family:'Manrope',sans-serif;font-size:32px;color:var(--txt);line-height:1;font-weight:700}
.kpi-sub{font-size:11.5px;color:var(--txt3);margin-top:5px}
.kpi-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;margin-top:6px}
.badge-green{background:rgba(29,158,112,.09);color:var(--green)}
.badge-amber{background:rgba(217,119,6,.09);color:var(--amber)}
.badge-red{background:rgba(220,38,38,.07);color:var(--red)}

/* ── GRID 2 COLS ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px}
.card{background:#fff;border:1px solid rgba(11,25,41,.06);border-radius:14px;padding:20px}
.card-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:16px}

/* ── BAR CHART ── */
.bar-list{display:flex;flex-direction:column;gap:10px}
.bar-item{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12.5px;color:var(--txt2);width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:rgba(11,25,41,.05);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue2),var(--pink));transition:width .6s ease}
.bar-num{font-size:12px;font-weight:600;color:var(--txt);min-width:28px;text-align:right}

/* ── DONUT ── */
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.leg-item{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--txt2)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── TIMELINE ── */
.timeline-bars{display:flex;align-items:flex-end;gap:3px;height:80px}
.tl-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.tl-bar{width:100%;background:linear-gradient(180deg,var(--blue2),var(--blue4));border-radius:3px 3px 0 0;min-height:3px;transition:height .4s ease}
.tl-label{font-size:8.5px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-align:center;width:100%}

/* ── TABLE ── */
.table-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.search-in{flex:1;border:1.5px solid rgba(11,25,41,.1);border-radius:9px;padding:8px 13px;font-family:'Inter Tight',sans-serif;font-size:13px;color:var(--txt);outline:none;background:var(--surface3)}
.search-in:focus{border-color:var(--blue2);background:#fff}
.filter-sel{border:1.5px solid rgba(11,25,41,.1);border-radius:9px;padding:8px 12px;font-family:'Inter Tight',sans-serif;font-size:12.5px;color:var(--txt2);background:var(--surface3);outline:none;cursor:pointer}
.filter-sel:focus{border-color:var(--blue2)}
table{width:100%;border-collapse:collapse}
thead th{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);padding:8px 12px;text-align:left;border-bottom:1px solid rgba(11,25,41,.06)}
tbody tr{border-bottom:1px solid rgba(11,25,41,.04);transition:background .15s}
tbody tr:hover{background:var(--surface3)}
td{padding:11px 12px;font-size:13px;color:var(--txt2)}
td.nome{color:var(--txt);font-weight:500}
.score-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;font-size:11.5px;font-weight:600}
.sc-alta{background:rgba(29,158,112,.09);color:var(--green)}
.sc-mod{background:rgba(217,119,6,.09);color:var(--amber)}
.sc-dev{background:rgba(11,25,41,.06);color:var(--txt2)}
.sc-inc{background:rgba(220,38,38,.07);color:var(--red)}
.hs-badge{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:500}
.hs-ok{background:rgba(29,158,112,.09);color:var(--green)}
.hs-no{background:rgba(11,25,41,.05);color:var(--txt3)}
.view-btn{background:none;border:1px solid rgba(11,25,41,.12);border-radius:7px;padding:4px 10px;font-size:11.5px;font-family:'Inter Tight',sans-serif;color:var(--txt2);cursor:pointer;transition:all .15s}
.view-btn:hover{border-color:var(--blue2);color:var(--txt)}
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
.pag-info{font-size:12.5px;color:var(--txt3)}
.pag-btns{display:flex;gap:6px}
.pag-btn{border:1.5px solid rgba(11,25,41,.1);background:#fff;border-radius:8px;padding:6px 13px;font-size:12.5px;font-family:'Inter Tight',sans-serif;color:var(--txt2);cursor:pointer;transition:all .15s}
.pag-btn:hover:not(:disabled){border-color:var(--blue2);color:var(--txt)}
.pag-btn:disabled{opacity:.4;cursor:default}
.pag-btn.active{background:linear-gradient(135deg,var(--blue2),var(--blue4));color:#fff;border-color:transparent}

/* ── LEAD DETAIL ── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-field{background:var(--surface3);border-radius:9px;padding:12px 14px}
.detail-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-bottom:4px}
.detail-val{font-size:13.5px;color:var(--txt);font-weight:500}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:13px;color:var(--txt2);cursor:pointer;margin-bottom:20px;padding:0;font-family:'Inter Tight',sans-serif}
.back-btn:hover{color:var(--txt)}
.json-block{background:var(--blue4);color:rgba(255,255,255,.85);border-radius:12px;padding:16px;font-size:11.5px;font-family:monospace;line-height:1.7;overflow-x:auto;white-space:pre-wrap;max-height:300px;overflow-y:auto}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--txt3);font-size:13px;gap:10px}
.spin{width:18px;height:18px;border:2px solid rgba(11,25,41,.1);border-top-color:var(--blue2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--txt3);font-size:13.5px}
/* ── FUNNEL ── */
.funnel-list{display:flex;flex-direction:column;gap:8px}
.funnel-item{display:grid;grid-template-columns:180px 1fr 80px 80px;align-items:center;gap:12px;padding:10px 14px;background:#fff;border:1px solid rgba(11,25,41,.06);border-radius:10px}
.funnel-label{font-size:13px;font-weight:500;color:var(--txt);display:flex;align-items:center;gap:7px}
.funnel-bar-wrap{height:10px;background:rgba(11,25,41,.05);border-radius:5px;overflow:hidden}
.funnel-bar{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--blue2),var(--pink));transition:width .6s ease}
.funnel-num{font-size:12.5px;font-weight:700;color:var(--txt);text-align:right}
.funnel-pct{font-size:11px;color:var(--txt3);text-align:right}
/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid rgba(11,25,41,.06);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:4px}
.stat-val{font-family:'Manrope',sans-serif;font-size:28px;color:var(--txt);font-weight:700;line-height:1}
.stat-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3)}
.stat-sub{font-size:12px;color:var(--txt2);margin-top:2px}
/* ── HEATMAP HOURS ── */
.hours-grid{display:grid;grid-template-columns:repeat(24,1fr);gap:3px;margin-top:8px}
.hour-cell{height:24px;border-radius:3px;background:rgba(11,25,41,.05);position:relative;cursor:default}
.hour-cell:hover::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:#0b1c30;color:#fff;font-size:10px;padding:3px 7px;border-radius:5px;white-space:nowrap;z-index:10}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-glow"></div>
  <div class="brand">
    <div class="brand-ico"><img src="https://lp.imigrareua.com/wp-content/uploads/2026/01/612990932_18427147024116839_8350086382818301433_n.jpg" style="width:100%;height:100%;object-fit:cover" alt="ImigrarEUA"/></div>
    <div>
      <div class="brand-name">Visa Match</div>
      <div class="brand-sub">Admin</div>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-sec">Visão Geral</div>
    <button class="nav-item active" onclick="showPanel('overview')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <div class="nav-sec">Dados</div>
    <button class="nav-item" onclick="showPanel('leads')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Leads
    </button>
    <button class="nav-item" onclick="showPanel('users')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Usuários
    </button>
    <button class="nav-item" onclick="showPanel('sessions')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Sessões Ativas
    </button>
    <button class="nav-item" onclick="showPanel('analytics')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Analytics
    </button>
  </nav>
  <div class="sb-footer">
    <button class="logout-btn" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sair
    </button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="panel-title">Dashboard</div>
      <div class="topbar-sub" id="panel-sub">Visão geral da ferramenta Visa Match</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      Atualizar
    </button>
  </div>
  <div class="content">

    <!-- OVERVIEW PANEL -->
    <div class="panel active" id="panel-overview">
      <div class="kpi-grid" id="kpi-grid">
        <div class="loading"><div class="spin"></div>Carregando...</div>
      </div>
      <div class="grid2">
        <div class="card">
          <div class="card-title">Leads por Visto</div>
          <div class="bar-list" id="visto-bars"></div>
        </div>
        <div class="card">
          <div class="card-title">Classificação de Score</div>
          <div class="donut-wrap" id="score-donut"></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:24px">
        <div class="card-title">Evolução de Leads — Últimos 30 dias</div>
        <div class="timeline-bars" id="timeline"></div>
      </div>
    </div>

    <!-- LEADS PANEL -->
    <div class="panel" id="panel-leads">
      <div id="leads-list-view">
        <div class="table-toolbar">
          <input class="search-in" id="search-in" placeholder="Buscar por nome ou e-mail..." oninput="debounceSearch()"/>
          <select class="filter-sel" id="filter-visto" onchange="loadLeads(1)">
            <option value="">Todos os vistos</option>
            <option>EB-2 NIW</option>
            <option>EB-1A</option>
            <option>O-1</option>
            <option>L-1</option>
            <option>E-2</option>
            <option>Family Based</option>
            <option>H-1B</option>
          </select>
          <select class="filter-sel" id="filter-score" onchange="loadLeads(1)">
            <option value="">Todos os scores</option>
            <option value="70,100">Alta (70+)</option>
            <option value="40,69">Moderada (40–69)</option>
            <option value="0,39">Em Desenvolvimento (0–39)</option>
            <option value="-100,-1">Incompatível</option>
          </select>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div id="leads-table-wrap"></div>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
      <div id="leads-detail-view" style="display:none"></div>
    </div>

    <!-- USERS PANEL -->
    <div class="panel" id="panel-users">
      <div class="table-toolbar">
        <input class="search-in" id="users-search-in" placeholder="Buscar por nome ou e-mail..." oninput="debounceUsersSearch()"/>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div id="users-table-wrap"></div>
      </div>
      <div class="pagination" id="users-pagination"></div>
    </div>

    <!-- SESSIONS PANEL -->
    <div class="panel" id="panel-sessions">
      <div class="card" style="padding:0;overflow:hidden">
        <div id="sessions-table-wrap"></div>
      </div>
      <div class="pagination" id="sessions-pagination"></div>
    </div>

    <!-- ANALYTICS PANEL -->
    <div class="panel" id="panel-analytics">
      <!-- Stats resumo -->
      <div class="stat-row" id="analytics-stats">
        <div class="loading"><div class="spin"></div></div>
      </div>
      <!-- Funil -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">🔽 Funil de Conversão — Onde os usuários param</div>
        <div class="funnel-list" id="funnel-list"><div class="loading"><div class="spin"></div>Carregando funil...</div></div>
      </div>
      <!-- Grid 2 colunas -->
      <div class="grid2">
        <div class="card">
          <div class="card-title">📊 Abandono por Etapa</div>
          <div id="abandon-chart" style="height:200px;position:relative;margin-top:8px"></div>
        </div>
        <div class="card">
          <div class="card-title">🕐 Sessões em Andamento (por etapa)</div>
          <div id="step-chart" style="height:200px;position:relative;margin-top:8px"></div>
        </div>
      </div>
    </div>

  </div>
</main>
</div>

<script>
const API = '/api/admin';
const token = localStorage.getItem('admin_token');
if (!token) window.location.href = '/admin/';

let searchTimer = null;
let currentPage = 1;

// ── AUTH ──
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  if (res.status === 401) { localStorage.removeItem('admin_token'); window.location.href = '/admin/'; }
  return res.json();
}

function logout() {
  localStorage.removeItem('admin_token');
  window.location.href = '/admin/';
}

// ── NAVIGATION ──
const panels = {
  overview:  { title: 'Dashboard',        sub: 'Visão geral da ferramenta Visa Match' },
  leads:     { title: 'Leads',            sub: 'Todos os leads coletados' },
  users:     { title: 'Usuários',         sub: 'Usuários cadastrados no portal' },
  sessions:  { title: 'Sessões Ativas',   sub: 'Análises em andamento nas últimas 24h' },
  analytics: { title: 'Analytics',  sub: 'Funil de conversão e padrões de comportamento' },
};

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  document.querySelector(`[onclick="showPanel('${id}')"]`).classList.add('active');
  document.getElementById('panel-title').textContent = panels[id].title;
  document.getElementById('panel-sub').textContent = panels[id].sub;
  if (id === 'leads') { document.getElementById('leads-detail-view').style.display = 'none'; document.getElementById('leads-list-view').style.display = ''; loadLeads(1); }
  if (id === 'users') loadUsers(1);
  if (id === 'sessions') loadSessions(1);
  if (id === 'analytics') loadAnalytics();
}

// ── LOAD ALL ──
function loadAll() { loadStats(); }

// ── STATS ──
async function loadStats() {
  document.getElementById('kpi-grid').innerHTML = '<div class="loading"><div class="spin"></div>Carregando...</div>';
  const [data, overview] = await Promise.all([apiFetch('/stats'), apiFetch('/overview').catch(()=>({}))]);
  Object.assign(data, overview);
  renderKPIs(data);
  renderVistoBars(data.porVisto);
  renderScoreDonut(data.porScore);
  renderTimeline(data.timeline);
}

function renderKPIs(d) {
  const kpis = [
    { label: 'Total de Leads', val: d.total || 0, sub: 'Formulário iniciado', badge: null },
    { label: 'Usuários Cadastrados', val: d.totalUsers || 0, sub: 'Portal ativo', badge: null },
    { label: 'Análises Salvas', val: d.totalAnalyses || 0, sub: 'Via portal', badge: null },
    { label: 'Sessões Hoje', val: d.activeSessions || 0, sub: 'Últimas 24h', badge: null },
  ];
  document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
      ${k.badge ? `<div class="kpi-badge ${k.badge.cls}">${k.badge.txt}</div>` : ''}
    </div>
  `).join('');
}

function renderVistoBars(porVisto) {
  const el = document.getElementById('visto-bars');
  if (!porVisto || !Object.keys(porVisto).length) { el.innerHTML = '<div class="empty">Nenhum dado ainda</div>'; return; }
  const max = Math.max(...Object.values(porVisto));
  el.innerHTML = Object.entries(porVisto)
    .sort((a, b) => b[1] - a[1])
    .map(([v, n]) => `
      <div class="bar-item">
        <span class="bar-label" title="${v}">${v}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${(n/max*100).toFixed(1)}%"></div></div>
        <span class="bar-num">${n}</span>
      </div>
    `).join('');
}

function renderScoreDonut(s) {
  if (!s) return;
  const total = Object.values(s).reduce((a, b) => a + b, 0);
  const cats = [
    { label: 'Alta (70+)', val: s.alta, color: '#1d9e70' },
    { label: 'Moderada (40–69)', val: s.moderada, color: '#d97706' },
    { label: 'Desenvolvimento', val: s.desenvolvimento, color: '#94a3b8' },
    { label: 'Incompatível', val: s.incompativel, color: '#dc2626' },
  ].filter(c => c.val > 0);

  if (!total) { document.getElementById('score-donut').innerHTML = '<div class="empty">Nenhum dado ainda</div>'; return; }

  // Simple SVG donut
  let offset = 0;
  const r = 36, cx = 44, cy = 44, circ = 2 * Math.PI * r;
  const segs = cats.map(c => {
    const pct = c.val / total;
    const dash = pct * circ;
    const seg = { ...c, pct, dash, offset };
    offset += dash;
    return seg;
  });

  const svg = `<svg class="donut-svg" width="88" height="88" viewBox="0 0 88 88">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f2ede4" stroke-width="10"/>
    ${segs.map(s => `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="10"
      stroke-dasharray="${s.dash} ${circ - s.dash}"
      stroke-dashoffset="${-(s.offset - circ / 4)}"
      transform="rotate(-90 ${cx} ${cy})"/>`).join('')}
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="16" font-family="Manrope" fill="#0b1929" font-weight="600">${total}</text>
  </svg>`;

  const legend = `<div class="donut-legend">${cats.map(c => `
    <div class="leg-item">
      <div class="leg-dot" style="background:${c.color}"></div>
      <span>${c.label}: <b>${c.val}</b></span>
    </div>
  `).join('')}</div>`;

  document.getElementById('score-donut').innerHTML = svg + legend;
}

function renderTimeline(timeline) {
  const el = document.getElementById('timeline');
  if (!timeline || !Object.keys(timeline).length) { el.innerHTML = '<div class="empty" style="flex:1">Nenhum dado ainda</div>'; return; }
  const entries = Object.entries(timeline).slice(-30);
  const max = Math.max(...entries.map(e => e[1]));
  el.innerHTML = entries.map(([dia, n]) => {
    const h = Math.max(4, Math.round((n / max) * 72));
    const label = dia.slice(5); // MM-DD
    return `<div class="tl-col">
      <div class="tl-bar" style="height:${h}px" title="${dia}: ${n} lead(s)"></div>
      <span class="tl-label">${label}</span>
    </div>`;
  }).join('');
}

// ── LEADS ──
async function loadLeads(page = 1) {
  currentPage = page;
  const search = document.getElementById('search-in')?.value || '';
  const visto = document.getElementById('filter-visto')?.value || '';
  const scoreRange = document.getElementById('filter-score')?.value || '';
  let qs = `?page=${page}&limit=15`;
  if (search) qs += `&search=${encodeURIComponent(search)}`;
  if (visto) qs += `&visto=${encodeURIComponent(visto)}`;
  if (scoreRange) { const [mn, mx] = scoreRange.split(','); qs += `&score_min=${mn}&score_max=${mx}`; }

  document.getElementById('leads-table-wrap').innerHTML = '<div class="loading"><div class="spin"></div>Carregando leads...</div>';
  const data = await apiFetch('/leads' + qs);
  renderLeadsTable(data);
}

function renderLeadsTable({ leads, total, page, pages }) {
  if (!leads?.length) {
    document.getElementById('leads-table-wrap').innerHTML = '<div class="empty">Nenhum lead encontrado.</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const rows = leads.map(l => {
    const sc = scoreClass(l.score);
    const dt = new Date(l.created_at).toLocaleDateString('pt-BR');
    return `<tr>
      <td class="nome">${l.nome || '—'}</td>
      <td>${l.email}</td>
      <td>${l.visto_recomendado || '—'}</td>
      <td><span class="score-pill ${sc.cls}">${l.score ?? '—'} pts</span></td>
      <td>${dt}</td>
      <td style="font-size:12px;color:var(--txt3)">${l.updated_at ? new Date(l.updated_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—'}</td>
      <td><span class="hs-badge ${l.hubspot_synced ? 'hs-ok' : 'hs-no'}">${l.hubspot_synced ? 'Sincronizado' : 'Pendente'}</span></td>
      <td><button class="view-btn" onclick="viewLead('${l.id}')">Ver</button></td>
    </tr>`;
  }).join('');

  document.getElementById('leads-table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Nome</th><th>E-mail</th><th>Visto</th><th>Score</th><th>Criado</th><th>Última interação</th><th>HubSpot</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  // Pagination
  const prevDis = page <= 1 ? 'disabled' : '';
  const nextDis = page >= pages ? 'disabled' : '';
  document.getElementById('pagination').innerHTML = `
    <span class="pag-info">${total} lead(s) · Página ${page} de ${pages || 1}</span>
    <div class="pag-btns">
      <button class="pag-btn" ${prevDis} onclick="loadLeads(${page - 1})">← Anterior</button>
      <button class="pag-btn" ${nextDis} onclick="loadLeads(${page + 1})">Próxima →</button>
    </div>`;
}

async function viewLead(id) {
  document.getElementById('leads-list-view').style.display = 'none';
  const dv = document.getElementById('leads-detail-view');
  dv.style.display = '';
  dv.innerHTML = '<div class="loading"><div class="spin"></div>Carregando...</div>';
  const l = await apiFetch('/leads/' + id);
  const sc = scoreClass(l.score);
  const dt = new Date(l.created_at).toLocaleString('pt-BR');
  const fields = [
    ['Nome', l.nome], ['E-mail', l.email], ['WhatsApp', l.phone],
    ['Visto Recomendado', l.visto_recomendado], ['Score', `${l.score} pts`],
    ['Data', dt], ['HubSpot', l.hubspot_synced ? '✓ Sincronizado' : 'Pendente'],
    ['HubSpot ID', l.hubspot_contact_id || '—'],
  ];
  dv.innerHTML = `
    <button class="back-btn" onclick="backToList()">← Voltar para lista</button>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div style="font-family:'Manrope',sans-serif;font-size:22px;color:var(--txt);font-weight:700">${l.nome || 'Lead'}</div>
        <span class="score-pill ${sc.cls}" style="font-size:13px">${l.score ?? '—'} pts · ${sc.label}</span>
      </div>
      <div class="detail-grid">
        ${fields.map(([lb, v]) => `<div class="detail-field"><div class="detail-label">${lb}</div><div class="detail-val">${v || '—'}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Perfil Completo (JSON)</div>
      <div class="json-block">${JSON.stringify(l.profile || {}, null, 2)}</div>
    </div>`;
}

function backToList() {
  document.getElementById('leads-detail-view').style.display = 'none';
  document.getElementById('leads-list-view').style.display = '';
}

function scoreClass(score) {
  if (score >= 70) return { cls: 'sc-alta', label: 'Alta' };
  if (score >= 40) return { cls: 'sc-mod', label: 'Moderada' };
  if (score >= 0)  return { cls: 'sc-dev', label: 'Desenvolvimento' };
  return { cls: 'sc-inc', label: 'Incompatível' };
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadLeads(1), 400);
}

// ── ANALYTICS ──
async function loadAnalytics() {
  document.getElementById('analytics-stats').innerHTML = '<div class="loading"><div class="spin"></div>Carregando...</div>';
  document.getElementById('funnel-list').innerHTML = '<div class="loading"><div class="spin"></div></div>';

  const [funnelData, statsData] = await Promise.all([
    apiFetch('/funnel').catch(() => ({})),
    apiFetch('/stats').catch(() => ({}))
  ]);

  renderAnalyticsStats(funnelData, statsData);
  renderFunnel(funnelData.funnel || [], funnelData.total || 0, funnelData.completos || 0);
  renderAbandonChart(funnelData.abandonMap || {});
  renderStepChart(funnelData.stepMap || {});
}

function renderAnalyticsStats(f, s) {
  const conv = f.conversionRate || 0;
  const total = f.total || 0;
  const completos = f.completos || 0;
  document.getElementById('analytics-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Taxa de Conversão</div>
      <div class="stat-val" style="color:${conv>=30?'var(--green)':conv>=15?'var(--amber)':'var(--red)'}">${conv}%</div>
      <div class="stat-sub">${completos} análises completas de ${total} iniciadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Leads Totais</div>
      <div class="stat-val">${total}</div>
      <div class="stat-sub">Todos os tempos</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Maior Abandono</div>
      <div class="stat-val" style="font-size:18px;color:var(--amber)">${getTopAbandono(f.abandonMap)}</div>
      <div class="stat-sub">Etapa com mais saídas</div>
    </div>`;
}

function getTopAbandono(map) {
  if (!map || !Object.keys(map).length) return '—';
  const top = Object.entries(map).sort((a,b) => b[1]-a[1])[0];
  const labels = { abandono_fundos:'Sem fundos', abandono_sem_perfil:'Sem perfil', nurturing_contato:'Nurturing', contato:'Contato' };
  return labels[top[0]] || top[0];
}

function renderFunnel(funnel, total, completos) {
  if (!funnel.length) { document.getElementById('funnel-list').innerHTML = '<div class="empty">Sem dados ainda.</div>'; return; }
  const maxVal = Math.max(...funnel.map(f => f.abandons + f.em_andamento), completos, 1);
  const rows = funnel.map(f => {
    const val = f.id === 'completo' ? completos : (f.abandons + f.em_andamento);
    const pct = total > 0 ? Math.round((val / total) * 100) : 0;
    const barW = Math.round((val / maxVal) * 100);
    const color = f.id === 'completo' ? 'background:linear-gradient(90deg,var(--green),#1d9e70)' :
                  f.abandons > 0 ? 'background:linear-gradient(90deg,var(--amber),#d97706)' :
                  'background:linear-gradient(90deg,var(--blue2),var(--pink))';
    return `<div class="funnel-item">
      <div class="funnel-label">${f.icon} ${f.label}</div>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${barW}%;${color}"></div></div>
      <div class="funnel-num">${val}</div>
      <div class="funnel-pct">${pct}%</div>
    </div>`;
  }).join('');
  document.getElementById('funnel-list').innerHTML = `
    <div style="display:grid;grid-template-columns:180px 1fr 80px 80px;gap:12px;padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3)">
      <span>Etapa</span><span>Distribuição</span><span style="text-align:right">Usuários</span><span style="text-align:right">%</span>
    </div>
    ${rows}`;
}

function renderAbandonChart(map) {
  const el = document.getElementById('abandon-chart');
  if (!map || !Object.keys(map).length) { el.innerHTML = '<div class="empty">Sem dados de abandono.</div>'; return; }
  const labels = { abandono_fundos:'Fundos', abandono_sem_perfil:'Sem perfil', nurturing_contato:'Nurturing', contato:'Contato' };
  const entries = Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0,6);
  const max = Math.max(...entries.map(e=>e[1]), 1);
  const bars = entries.map(([k,v]) => {
    const h = Math.round((v/max)*160);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <span style="font-size:11px;font-weight:700;color:var(--amber)">${v}</span>
      <div style="width:100%;height:${h}px;background:linear-gradient(180deg,var(--amber),#d97706);border-radius:4px 4px 0 0;min-height:4px"></div>
      <span style="font-size:9.5px;color:var(--txt3);text-align:center;line-height:1.2">${labels[k]||k}</span>
    </div>`;
  }).join('');
  el.innerHTML = `<div style="display:flex;align-items:flex-end;gap:8px;height:100%;padding-bottom:20px">${bars}</div>`;
}

function renderStepChart(map) {
  const el = document.getElementById('step-chart');
  if (!map || !Object.keys(map).length) { el.innerHTML = '<div class="empty">Nenhuma sessão ativa.</div>'; return; }
  const stepLabels = { welcome:'Bem-vindo', contact_email:'Email', contact_name:'Nome', path_select:'Triagem', personal_info:'Perfil', academic_start:'Formação', prof_exp_start:'Experiência', scoring_intro:'Scoring', resultado:'Resultado' };
  const entries = Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0,8);
  const max = Math.max(...entries.map(e=>e[1]), 1);
  const bars = entries.map(([k,v]) => {
    const h = Math.round((v/max)*160);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <span style="font-size:11px;font-weight:700;color:var(--blue2)">${v}</span>
      <div style="width:100%;height:${h}px;background:linear-gradient(180deg,var(--blue2),var(--blue4));border-radius:4px 4px 0 0;min-height:4px"></div>
      <span style="font-size:9.5px;color:var(--txt3);text-align:center;line-height:1.2">${stepLabels[k]||k}</span>
    </div>`;
  }).join('');
  el.innerHTML = `<div style="display:flex;align-items:flex-end;gap:8px;height:100%;padding-bottom:20px">${bars}</div>`;
}

// ── USERS ──
let usersSearchTimer = null;
function debounceUsersSearch() {
  clearTimeout(usersSearchTimer);
  usersSearchTimer = setTimeout(() => loadUsers(1), 400);
}

async function loadUsers(page = 1) {
  const search = document.getElementById('users-search-in')?.value || '';
  let qs = `?page=${page}&limit=15`;
  if (search) qs += `&search=${encodeURIComponent(search)}`;
  document.getElementById('users-table-wrap').innerHTML = '<div class="loading"><div class="spin"></div>Carregando usuários...</div>';
  const data = await apiFetch('/users' + qs);
  renderUsersTable(data);
}

function renderUsersTable({ users, total, page, pages }) {
  if (!users?.length) {
    document.getElementById('users-table-wrap').innerHTML = '<div class="empty">Nenhum usuário cadastrado ainda.</div>';
    document.getElementById('users-pagination').innerHTML = '';
    return;
  }
  const rows = users.map(u => {
    const dt = new Date(u.created_at).toLocaleDateString('pt-BR');
    return `<tr>
      <td class="nome">${u.nome || '—'}</td>
      <td>${u.email}</td>
      <td style="text-align:center"><span class="score-pill sc-dev">${u.n_analyses || 0} análise(s)</span></td>
      <td>${dt}</td>
      <td><button class="view-btn" onclick="viewUserAnalyses('${u.id}','${u.nome||u.email}')">Ver análises</button></td>
    </tr>`;
  }).join('');
  document.getElementById('users-table-wrap').innerHTML = `
    <table>
      <thead><tr><th>Nome</th><th>E-mail</th><th>Análises</th><th>Cadastro</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  const prev = page<=1?'disabled':'', next = page>=pages?'disabled':'';
  document.getElementById('users-pagination').innerHTML = `
    <span class="pag-info">${total} usuário(s) · Página ${page} de ${pages||1}</span>
    <div class="pag-btns">
      <button class="pag-btn" ${prev} onclick="loadUsers(${page-1})">← Anterior</button>
      <button class="pag-btn" ${next} onclick="loadUsers(${page+1})">Próxima →</button>
    </div>`;
}

async function viewUserAnalyses(userId, userName) {
  document.getElementById('users-table-wrap').innerHTML = `
    <div style="padding:16px">
      <button class="view-btn" onclick="loadUsers(1)" style="margin-bottom:12px">← Voltar</button>
      <div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:12px">Análises de ${userName}</div>
      <div id="user-analyses-wrap"><div class="loading"><div class="spin"></div>Carregando...</div></div>
    </div>`;
  const analyses = await apiFetch(`/users/${userId}/analyses`);
  if (!analyses?.length) { document.getElementById('user-analyses-wrap').innerHTML = '<div class="empty">Nenhuma análise ainda.</div>'; return; }
  const rows = analyses.map(a => {
    const pct = a.aprovacao_pct ?? a.score ?? 0;
    const dt  = new Date(a.created_at).toLocaleDateString('pt-BR');
    const sc  = a.classificacao?.includes('Alta') ? 'sc-alta' : a.classificacao?.includes('Moderada') ? 'sc-mod' : a.classificacao?.includes('Incompat') ? 'sc-inc' : 'sc-dev';
    return `<tr><td class="nome">${a.visto||'—'}</td><td><span class="score-pill ${sc}">${pct}%</span></td><td>${a.classificacao||'—'}</td><td>${dt}</td></tr>`;
  }).join('');
  document.getElementById('user-analyses-wrap').innerHTML = `<table><thead><tr><th>Visto</th><th>Score</th><th>Classificação</th><th>Data</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── SESSIONS ──
async function loadSessions(page = 1) {
  document.getElementById('sessions-table-wrap').innerHTML = '<div class="loading"><div class="spin"></div>Carregando sessões...</div>';
  const data = await apiFetch(`/sessions?page=${page}&limit=20`);
  renderSessionsTable(data);
}

function renderSessionsTable({ sessions, total, page, pages }) {
  if (!sessions?.length) {
    document.getElementById('sessions-table-wrap').innerHTML = '<div class="empty">Nenhuma sessão ativa nas últimas 24h.</div>';
    document.getElementById('sessions-pagination').innerHTML = '';
    return;
  }
  const rows = sessions.map(s => {
    const upd = new Date(s.updated_at).toLocaleString('pt-BR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'});
    return `<tr>
      <td class="nome">${s.email||'Anônimo'}</td>
      <td>${s.step||'—'}</td>
      <td>${s.visto||'—'}</td>
      <td style="text-align:center"><div class="bar-track" style="width:80px"><div class="bar-fill" style="width:${s.prog||0}%"></div></div></td>
      <td>${upd}</td>
      <td style="font-size:11px;color:var(--txt3)">${s.ip_address||'—'}</td>
    </tr>`;
  }).join('');
  document.getElementById('sessions-table-wrap').innerHTML = `
    <table>
      <thead><tr><th>E-mail</th><th>Etapa</th><th>Visto</th><th>Progresso</th><th>Última atividade</th><th>IP</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  const prev = page<=1?'disabled':'', next = page>=pages?'disabled':'';
  document.getElementById('sessions-pagination').innerHTML = `
    <span class="pag-info">${total} sessão(ões) · Página ${page} de ${pages||1}</span>
    <div class="pag-btns">
      <button class="pag-btn" ${prev} onclick="loadSessions(${page-1})">← Anterior</button>
      <button class="pag-btn" ${next} onclick="loadSessions(${page+1})">Próxima →</button>
    </div>`;
}
