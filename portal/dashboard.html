<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Análises — Visa Match</title>
<link rel="icon" type="image/jpeg" href="https://lp.imigrareua.com/wp-content/uploads/2026/01/612990932_18427147024116839_8350086382818301433_n.jpg"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0053d0;--blue2:#1A72F6;--blue3:#003fa3;--blue4:#002b70;
  --pink:#ff4b82;--surface:#fff;--surface2:#f8faff;--surface3:#f0f4ff;--surface4:#e5eeff;
  --txt:#0b1c30;--txt2:#424655;--txt3:#737687;
  --border:rgba(194,198,216,.5);--green:#1d9e70;--amber:#d97706;--red:#dc2626;
  --sh:0 2px 12px rgba(11,28,48,.08);
}
html,body{height:100%;font-family:'Inter Tight','Inter',sans-serif;background:var(--surface2);color:var(--txt);overflow-x:hidden}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:linear-gradient(180deg,#1A72F6 0%,#002b70 100%);display:flex;flex-direction:column;padding:28px 20px;position:relative}
.flag-bg{position:absolute;bottom:0;left:0;right:0;height:50%;background-image:url('https://lp.imigrareua.com/wp-content/uploads/2026/06/bandeira-eua-desfoque-visamatch.png');background-size:cover;opacity:.25;pointer-events:none}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.1);position:relative;z-index:1}
.brand-ico{width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
.brand-ico img{width:100%;height:100%;object-fit:cover}
.brand-name{font-family:'Manrope',sans-serif;font-size:16px;color:#fff;font-weight:700;line-height:1.2}
.brand-sub{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.1em}
.user-info{background:rgba(255,255,255,.1);border-radius:12px;padding:14px;margin-bottom:24px;position:relative;z-index:1}
.user-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.user-email{font-size:11.5px;color:rgba(255,255,255,.55)}
.nav{flex:1;position:relative;z-index:1}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.2)}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.sb-footer{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.08);position:relative;z-index:1}
.logout-btn{display:flex;align-items:center;gap:8px;font-size:12.5px;color:rgba(255,255,255,.35);cursor:pointer;background:none;border:none;padding:6px 8px;border-radius:7px;transition:all .2s;width:100%}
.logout-btn:hover{color:var(--red);background:rgba(220,38,38,.07)}

/* MAIN */
.main{padding:32px 36px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-title{font-family:'Manrope',sans-serif;font-size:24px;color:var(--txt);font-weight:700}
.page-sub{font-size:13px;color:var(--txt3);margin-top:3px}
.new-btn{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--blue2),var(--pink));color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Inter Tight',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;text-decoration:none;transition:opacity .2s}
.new-btn:hover{opacity:.9}

/* CARDS */
.analyses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.analysis-card{background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;cursor:pointer}
.analysis-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(11,28,48,.12)}
.card-header{background:linear-gradient(135deg,#1A72F6,#002b70);padding:18px 20px;position:relative}
.card-visto{font-family:'Manrope',sans-serif;font-size:18px;color:#fff;font-weight:700;margin-bottom:2px}
.card-date{font-size:11px;color:rgba(255,255,255,.5)}
.card-score{position:absolute;top:16px;right:16px;text-align:center}
.card-pct{font-family:'Manrope',sans-serif;font-size:24px;color:#fff;font-weight:800;line-height:1}
.card-pct-lbl{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.05em}
.card-body{padding:16px 20px}
.card-cls{display:inline-flex;align-items:center;padding:4px 11px;border-radius:99px;font-size:11.5px;font-weight:700;margin-bottom:12px}
.cls-alta{background:rgba(29,158,112,.08);color:#065f46}
.cls-mod{background:rgba(217,119,6,.08);color:#78350f}
.cls-dev{background:var(--surface3);color:var(--txt2)}
.cls-inc{background:rgba(220,38,38,.06);color:#7f1d1d}
.card-actions{display:flex;gap:8px;margin-top:12px}
.card-btn{flex:1;padding:8px 12px;border-radius:8px;font-family:'Inter Tight',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--txt2);transition:all .2s;text-align:center}
.card-btn:hover{border-color:var(--blue2);color:var(--blue)}
.card-btn.primary{background:linear-gradient(135deg,var(--blue2),var(--pink));color:#fff;border:none}
.card-btn.primary:hover{opacity:.9}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-ico{font-size:48px;margin-bottom:16px}
.empty-title{font-family:'Manrope',sans-serif;font-size:20px;color:var(--txt);font-weight:700;margin-bottom:8px}
.empty-sub{font-size:14px;line-height:1.6}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--txt3)}
.spin{width:20px;height:20px;border:2.5px solid rgba(0,83,208,.1);border-top-color:var(--blue2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:700px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:20px 16px}
  .analyses-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="flag-bg"></div>
    <div class="brand">
      <div class="brand-ico"><img src="https://lp.imigrareua.com/wp-content/uploads/2026/01/612990932_18427147024116839_8350086382818301433_n.jpg" alt="ImigrarEUA"/></div>
      <div>
        <div class="brand-name">Visa Match</div>
        <div class="brand-sub">Portal</div>
      </div>
    </div>
    <div class="user-info">
      <div class="user-name" id="user-name">—</div>
      <div class="user-email" id="user-email">—</div>
    </div>
    <nav class="nav">
      <button class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Minhas Análises
      </button>
    </nav>
    <div class="sb-footer">
      <button class="logout-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Minhas Análises</div>
        <div class="page-sub" id="analyses-count">Carregando...</div>
      </div>
      <a href="/" class="new-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova Análise
      </a>
    </div>
    <div id="content">
      <div class="loading"><div class="spin"></div>Carregando suas análises...</div>
    </div>
  </main>
</div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
const token = localStorage.getItem('vm_user_token');
const user  = JSON.parse(localStorage.getItem('vm_user') || '{}');

if (!token) { window.location.href = '/portal/'; }

// Preenche info do usuário
document.getElementById('user-name').textContent  = user.nome  || 'Usuário';
document.getElementById('user-email').textContent = user.email || '';

function logout() {
  localStorage.removeItem('vm_user_token');
  localStorage.removeItem('vm_user');
  window.location.href = '/portal/';
}

function scoreClass(cls) {
  const m = { 'Alta':'cls-alta','Moderada':'cls-mod','Em Desenvolvimento':'cls-dev','Incompatível':'cls-inc' };
  return m[cls] || 'cls-dev';
}

async function loadAnalyses() {
  try {
    const res = await fetch(`${API}/user/analyses`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.status === 401) { logout(); return; }
    const analyses = await res.json();

    document.getElementById('analyses-count').textContent =
      analyses.length ? `${analyses.length} análise(s) realizada(s)` : 'Nenhuma análise ainda';

    if (!analyses.length) {
      document.getElementById('content').innerHTML = `
        <div class="empty">
          <div class="empty-ico">📊</div>
          <div class="empty-title">Nenhuma análise ainda</div>
          <div class="empty-sub">Faça sua primeira análise de elegibilidade e salve aqui para acompanhar.</div>
          <a href="/" class="new-btn" style="display:inline-flex;margin-top:20px">Iniciar análise →</a>
        </div>`;
      return;
    }

    const cards = analyses.map(a => {
      const pct  = a.aprovacao_pct ?? a.score ?? 0;
      const date = new Date(a.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
      const cls  = scoreClass(a.classificacao);
      return `
        <div class="analysis-card" onclick="openAnalysis('${a.id}')">
          <div class="card-header">
            <div class="card-visto">${a.visto || '—'}</div>
            <div class="card-date">${date}</div>
            <div class="card-score">
              <div class="card-pct">${pct}%</div>
              <div class="card-pct-lbl">score</div>
            </div>
          </div>
          <div class="card-body">
            <div class="card-cls ${cls}">${a.classificacao || '—'}</div>
            <div class="card-actions">
              <button class="card-btn primary" onclick="event.stopPropagation();openAnalysis('${a.id}')">Ver relatório</button>
              <button class="card-btn" onclick="event.stopPropagation();newAnalysis()">Nova análise</button>
            </div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('content').innerHTML = `<div class="analyses-grid">${cards}</div>`;
  } catch(err) {
    console.error(err);
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-title">Erro ao carregar</div></div>';
  }
}

async function openAnalysis(id) {
  const res = await fetch(`${API}/user/analyses/${id}`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  if (!res.ok) return;
  const data = await res.json();
  localStorage.setItem('visamatch_report', JSON.stringify({
    ...(data.analysis_json || {}),
    candidato: { nome: user.nome, email: user.email }
  }));
  window.open('/report.html', '_blank', 'fullscreen=yes');
}

function newAnalysis() {
  window.location.href = '/';
}

loadAnalyses();
</script>
</body>
</html>
